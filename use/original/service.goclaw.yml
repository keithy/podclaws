# Full goclaw service using original upstream Dockerfile build
#
# Usage:
#   docker compose -f use/original/service.goclaw.yml up -d
#
# Builds from ${GOCLAW_DIR}/Dockerfile with full goclaw image

services:
  goclaw:
    build:
      context: ${GOCLAW_DIR:-./goclaw}
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "${ENABLE_OTEL:-false}"
        ENABLE_EMBEDUI: "${ENABLE_EMBEDUI:-true}"
        ENABLE_PYTHON: "${ENABLE_PYTHON:-true}"
        ENABLE_FULL_SKILLS: "${ENABLE_FULL_SKILLS:-false}"

    ports:
      - "${GOCLAW_PORT:-18790}:18790"

    env_file:
      - path: .env
        required: false

    environment:
      - GOCLAW_DATA_DIR=/app/data
      - GOCLAW_CONFIG=/app/data/config.json
      - GOCLAW_SKILLS_DIR=/app/skills
      - GOCLAW_WORKSPACE=/app/workspace
      - GOCLAW_GATEWAY_TOKEN=${GOCLAW_GATEWAY_TOKEN:?run ./prepare-env.sh or set GOCLAW_GATEWAY_TOKEN}
      - GOCLAW_ENCRYPTION_KEY=${GOCLAW_ENCRYPTION_KEY:-}
      - GOCLAW_TRACE_VERBOSE=${GOCLAW_TRACE_VERBOSE:-0}
      - GOCLAW_HOST=0.0.0.0
      - GOCLAW_PORT=18790

    volumes:
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
      - goclaw-skills:/app/skills

    extra_hosts:
      - "host.docker.internal:host-gateway"

    security_opt:
      - no-new-privileges:true

    init: true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200

    networks:
      - default

    restart: unless-stopped

volumes:
  goclaw-data:
  goclaw-workspace:
  goclaw-skills:

networks:
  net:
    driver: bridge