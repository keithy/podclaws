# Podman network overlay — kept for network isolation config.
# DNS resolution is now handled automatically via NGINX_ENTRYPOINT_LOCAL_RESOLVERS.
# Use with: docker compose -f ... -f options/podman/podman-network-fix.yml up -d

networks:
  default:
    driver: bridge

services:
  goclaw-ui:
    volumes:
      - ./podman/config/nginx.default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - goclaw-net
    environment:
      NGINX_ENTRYPOINT_LOCAL_RESOLVERS: 1