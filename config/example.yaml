---
networks:
  default:
    driver: bridge
services:
  goclaw:
    build:
      context: ${GOCLAW_DIR}/../use/goclaw
    cap_add:
    - SETUID
    - SETGID
    - CHOWN
    cap_drop:
    - ALL
    command:
    - /bin/goclaw
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200
    env_file:
    - path: .env
      required: false
    environment:
    - GOCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
    - HOME=/app
    - GOCLAW_DATA_DIR=/app/data
    - GOCLAW_CONFIG=/app/data/config.json
    - GOCLAW_WORKSPACE=/app/workspace
    - GOCLAW_GATEWAY_TOKEN=${GOCLAW_GATEWAY_TOKEN:?run ./prepare-env.sh or set GOCLAW_GATEWAY_TOKEN}
    - GOCLAW_ENCRYPTION_KEY=${GOCLAW_ENCRYPTION_KEY:-}
    - GOCLAW_TRACE_VERBOSE=${GOCLAW_TRACE_VERBOSE:-0}
    - GOCLAW_HOST=${GOCLAW_HOST:-0.0.0.0}
    - GOCLAW_PORT=${GOCLAW_PORT:-18790}
    - PIP_BREAK_SYSTEM_PACKAGES=1
    - PATH=/app/.local/bin:/app/data/.runtime/bin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/sbin
    - HOST_TASKS_DIR=/app/data/.runtime/sensible/tasks
    - MISE_STAGE_DIR=/usr/bin
    - MISE_VERSION=2026.6.13
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
      - CMD
      - wget
      - -qO-
      - http://localhost:${GOCLAW_PORT:-18790}/health
      timeout: 5s
    image: localhost/goclaw:current
    init: false
    networks:
    - default
    ports:
    - ${GOCLAW_PORT:-18790}:18790
    restart: unless-stopped
    tmpfs:
    - /tmp:rw,noexec,nosuid,size=256m
    volumes:
    - goclaw-skills:/app/skills
    - goclaw-workspace:/app/.goclaw
    - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/goclaw:/bin/goclaw:ro
    - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/pkg-helper:/bin/pkg-helper:ro
    - ${GOCLAW_DIR}/skills:/app/bundled-skills:ro
    - ${PODCLAWS_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}:/etc/ssl/certs/ca-certificates.crt:ro
    - goclaw-data:/app/data
    - goclaw-workspace:/app/workspace
    - ./use/self-improve/shared-sbin:/usr/local/sbin:ro
    - ./use/alpine/installers:/usr/local/bin:ro
    - ./use/self-improve/skills/self-improve:/app/bundled-skills/self-improve:ro
  goclaw-ui:
    build:
      context: ${GOCLAW_DIR:-.}/ui/web
      dockerfile: Dockerfile
    depends_on:
    - goclaw
    environment:
      NGINX_ENTRYPOINT_LOCAL_RESOLVERS: 1
    image: ghcr.io/nextlevelbuilder/goclaw-web:latest
    init: false
    networks:
    - default
    ports:
    - ${GOCLAW_UI_PORT:-3000}:80
    restart: unless-stopped
    stop_signal: SIGTERM
    user: 0:0
    volumes:
    - ./podman/config/nginx.default.conf:/etc/nginx/conf.d/default.conf:ro
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_USER: ${POSTGRES_USER:-goclaw}
    healthcheck:
      interval: 5s
      retries: 10
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-goclaw} -d ${POSTGRES_DB:-goclaw}
      timeout: 5s
    image: pgvector/pgvector:pg18
    init: false
    networks:
    - default
    ports:
    - ${POSTGRES_PORT:-5432}:5432
    restart: unless-stopped
    volumes:
    - postgres-data:/var/lib/postgresql
  upgrade:
    cap_drop:
    - ALL
    command:
    - /bin/goclaw
    - upgrade
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
    - path: .env
      required: false
    environment:
    - GOCLAW_MIGRATIONS_DIR=/app/migrations
    - GOCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
    - GOCLAW_DATA_DIR=/app/data
    - GOCLAW_CONFIG=/app/data/config.json
    - GOCLAW_ENCRYPTION_KEY=${GOCLAW_ENCRYPTION_KEY:-}
    extra_hosts:
    - host.docker.internal:host-gateway
    image: localhost/goclaw:base
    init: false
    networks:
    - default
    restart: no
    security_opt:
    - no-new-privileges:true
    volumes:
    - goclaw-data:/app/data
    - ${RELEASES_DIR:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/goclaw:/bin/goclaw:ro
    - ${GOCLAW_DIR:-./goclaw}/migrations:/app/migrations:ro
volumes:
  goclaw-data: null
  goclaw-skills: null
  goclaw-workspace: null
  mise-cache: null
  mise-glibc: null
  mise-musl: null
  postgres-data: null
