# ZFS volumes override - bind host ZFS datasets to container volumes
#
# ZFS datasets are mounted at /srv/auto_*/_data, NOT at /srv/auto_*.
# Binding to the parent dir would either fail (if it doesn't exist) or
# create a regular dir that shadows the ZFS mount. Always use /_data.
#
# `create_host_path: false` so a missing ZFS mount surfaces as a clear
# error instead of silently creating a regular dir on the parent path.
#
# Discover the actual mountpoints with: zfs list -o name,mountpoint
#
# Usage:
#   docker compose -f use/goclaw/service.goclaw.yml -f zfs/+zfs.yml up -d

volumes:
  goclaw-data:
    type: bind
    source: /srv/auto_goclaw-data/_data
    target: /app/data
    bind:
      create_host_path: false
  goclaw-workspace:
    type: bind
    source: /srv/auto_goclaw-workspace/_data
    target: /app/workspace
    bind:
      create_host_path: false
  goclaw-skills:
    type: bind
    source: /srv/auto_goclaw-skills/_data
    target: /app/skills
    bind:
      create_host_path: false
  postgres-data:
    type: bind
    source: /srv/auto_postgres-data/_data
    target: /var/lib/postgresql/data
    bind:
      create_host_path: false
  mise-musl:
    type: bind
    source: /srv/auto_mise-musl/_data
    target: /usr/share/mise
    bind:
      create_host_path: false
  mise-cache:
    type: bind
    source: /srv/auto_mise-cache/_data
    target: /app/.cache/mise
    bind:
      create_host_path: false
