# Skeleton compose file with goclaw service definition.
# Use with overlay:
#   docker compose -f use/goclaw/service.goclaw.yml -f use/goclaw/+self-improve.yml up -d
#
# Variables (from .env):
#   GOCLAW_DEPLOY_VERSION   e.g. arm64/latest, amd64/v1.9.0  (default: arm64/latest)
#   GOCLAW_PORT             Web UI port (default: 18790)
#   GOCLAW_RELEASES         Path to releases dir (default: ../RELEASES/goclaw)

services:
  goclaw:
    image: localhost/goclaw:current
    build:
      context: ${GOCLAW_DIR}/../use/goclaw

    command: ["/bin/goclaw"]
    

    ports:
      - "${GOCLAW_PORT:-18790}:18790"

    env_file:
      - path: .env
        required: false

    environment:
      - HOME=/app
      - GOCLAW_DATA_DIR=/app/data
      - GOCLAW_CONFIG=/app/data/config.json
      - GOCLAW_WORKSPACE=/app/workspace
      - GOCLAW_GATEWAY_TOKEN=${GOCLAW_GATEWAY_TOKEN:?run ./prepare-env.sh or set GOCLAW_GATEWAY_TOKEN}
      - GOCLAW_ENCRYPTION_KEY=${GOCLAW_ENCRYPTION_KEY:-}
      - GOCLAW_TRACE_VERBOSE=${GOCLAW_TRACE_VERBOSE:-0}
      - GOCLAW_HOST=${GOCLAW_HOST:-0.0.0.0}
      - GOCLAW_PORT=${GOCLAW_PORT:-18790}

      # Runtime paths for package installs (normally set by docker-entrypoint.sh)
      - PIP_BREAK_SYSTEM_PACKAGES=1
      # PATH order (matters for the lazy shim layer):
      #   1. ~/.local/bin       — per-user installed tools
      #   2. .runtime/bin       — goclaw runtime scripts (volume-mounted)
      #   3. /usr/local/bin     — site-local binaries (manual installs)
      #   4. /usr/sbin          — Alpine system admin tools
      #   5. /usr/bin           — distro packages (real pg_dump, python3, etc.)
      #   6. /sbin              — legacy system tools
      #   7. /bin               — BusyBox applets and coreutils
      #   8. /usr/local/sbin    — LAZY SHIMS LAST (fallback only)
      # The shims at /usr/local/sbin (python, python3, pip, pip3, pipx, node,
      # npm, go, gh, mise, pg_dump) only fire when the real binary is missing
      # on /usr/bin. Putting them last means goclaw's exec.Command("pg_dump",
      # ...) hits /usr/bin/pg_dump directly and gets the real version string.
      #
      # For mise-based installs, +mise-improve.yml prepends
      # /app/.local/share/mise/shims and /usr/share/mise/bin to PATH.
      - PATH=/app/.local/bin:/app/data/.runtime/bin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/sbin

    volumes:
      - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/goclaw:/bin/goclaw:ro
      - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/pkg-helper:/bin/pkg-helper:ro
      - ${GOCLAW_DIR}/skills:/app/bundled-skills:ro
      # Bind-mount the host's CA bundle so the container picks up CA
      # updates without rebuilding the image. The host path is the
      # standard Alpine location; override PODCLAWS_CA_BUNDLE if your
      # host uses a different layout (e.g. /etc/pki/tls/certs/... on RHEL).
      - ${PODCLAWS_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}:/etc/ssl/certs/ca-certificates.crt:ro
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
      # For mise-based installs, +mise-improve.yml adds the
      # mise-musl and mise-cache named volumes.

    extra_hosts:
      - "host.docker.internal:host-gateway"

# This is the option that enables/disables sudo
# and full self-improvement i.e. apk installs
#    security_opt:
#      - no-new-privileges:true

    # default setting
    # init: false

    # Workaround: goclaw (Go binary) does not reap child processes when running
    # as PID 1, causing zombies to accumulate until the cgroup pids.max cap is
    # hit. Podman/Docker's `init: true` wraps the command with tini which reaps.
    # Remove once goclaw installs a SIGCHLD handler internally.
    init: true

    cap_drop:
      - ALL

    cap_add:
      - SETUID
      - SETGID
      - CHOWN

    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
          
    networks:
      - default

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${GOCLAW_PORT:-18790}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  goclaw-data:
  goclaw-workspace:
  # For mise-based installs, +mise-improve.yml declares mise-musl and mise-cache.
