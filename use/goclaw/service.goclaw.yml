# Skeleton compose file with goclaw service definition.
# Use with overlay:
#   docker compose -f use/goclaw/service.goclaw.yml -f use/goclaw/+self-improve.yml up -d
#
# Variables (from .env):
#   GOCLAW_DEPLOY_VERSION   e.g. arm64/latest, amd64/v1.9.0  (default: arm64/latest)
#   GOCLAW_PORT             Web UI port (default: 18790)
#   GOCLAW_RELEASES         Path to releases dir (default: ../RELEASES/goclaw)

services:
  goclaw:
    image: localhost/goclaw:current

    command: ["/bin/goclaw"]

    ports:
      - "${GOCLAW_PORT:-18790}:18790"

    env_file:
      - path: .env
        required: false

    environment:
      - HOME=/app
      - GOCLAW_DATA_DIR=/app/data
      - GOCLAW_CONFIG=/app/data/config.json
      - GOCLAW_WORKSPACE=/app/workspace
      - GOCLAW_GATEWAY_TOKEN=${GOCLAW_GATEWAY_TOKEN:?run ./prepare-env.sh or set GOCLAW_GATEWAY_TOKEN}
      - GOCLAW_ENCRYPTION_KEY=${GOCLAW_ENCRYPTION_KEY:-}
      - GOCLAW_TRACE_VERBOSE=${GOCLAW_TRACE_VERBOSE:-0}
      - GOCLAW_HOST=${GOCLAW_HOST:-0.0.0.0}
      - GOCLAW_PORT=${GOCLAW_PORT:-18790}
      
      # Mise hybrid configuration:
      # MISE_DATA_DIR holds compiled binaries (architecture + libc specific).
      #   Mounted from the 'mise-musl' volume at /usr/share/mise. The volume's
      #   root maps to the data dir; mise puts binaries at $MISE_DATA_DIR/installs/.
      #   Shared within a libc family (Alpine/musl consumers) but NOT across
      #   different libcs - compiled toolchains are not portable.
      - MISE_DATA_DIR=/usr/share/mise
      - MISE_SHIMS_DIR=/app/.local/share/mise/shims

      # MISE_CACHE_DIR: not set explicitly - mise uses the XDG default
      # ($HOME/.cache/mise = /app/.cache/mise since HOME=/app). The 'mise-cache'
      # volume is mounted at this path so downloads persist across container
      # restarts.
      # MISE_CACHE_DIR holds downloaded tarballs/wheels (architecture-independent, shareable).

      # Runtime paths for package installs (normally set by docker-entrypoint.sh)
      - PIP_BREAK_SYSTEM_PACKAGES=1
      - PATH=/app/.local/share/mise/shims:/app/.local/bin:/app/data/.runtime/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    volumes:
      - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/goclaw:/bin/goclaw:ro
      - ${PODCLAWS_RELEASES:-./RELEASES}/goclaw/${GOCLAW_DEPLOY_VERSION}/pkg-helper:/bin/pkg-helper:ro
      - ${GOCLAW_DIR}/skills:/app/bundled-skills:ro
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
      - mise-musl:/usr/share/mise
      - mise-cache:/app/.cache/mise

      # (this is defined for postgres service but somehow missing in the default)

    extra_hosts:
      - "host.docker.internal:host-gateway"

# This is the option that enables/disables sudo
# and full self-improvement i.e. apk installs
#    security_opt:
#      - no-new-privileges:true

    # default setting
    # init: false

    cap_drop:
      - ALL

    cap_add:
      - SETUID
      - SETGID
      - CHOWN

    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
          
    networks:
      - default
      - goclaw-net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${GOCLAW_PORT:-18790}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  goclaw-data:
  goclaw-workspace:
  mise-musl:
  mise-cache:
