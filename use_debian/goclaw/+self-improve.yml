# Self-improve overlay for goclaw (Debian variant)
# Mirrors use/goclaw/+self-improve.yml but mounts from the Debian-specific
# self-improve scripts at use_debian/self-improve/. The Alpine overlay
# uses apk-based add-* scripts; the Debian version will use apt-based ones.
#
# Launch:
#   docker compose -f use_debian/goclaw/service.goclaw.yml -f use_debian/goclaw/+self-improve.yml up -d

services:
  goclaw:
    volumes:
      - ${SELF_IMPROVE_DIR:-./use_debian/self-improve}/sbin:/usr/local/sbin:ro
      - ${SELF_IMPROVE_DIR:-./use_debian/self-improve}/skills/self-improve:/app/bundled-skills/self-improve:ro
    environment:
      - HOST_TASKS_DIR=/app/data/.runtime/sensible/tasks
