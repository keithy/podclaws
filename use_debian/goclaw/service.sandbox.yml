# Sandbox service for the Debian goclaw variant.
# FUTURE WORK — not yet implemented.
#
# Per the upstream convention (goclaw/Dockerfile.sandbox), the sandbox
# image is always debian:bookworm-slim regardless of the host distro.
# This keeps the sandbox predictable and avoids cross-distro
# translation layers.
#
# To activate:
#   1. Create ./Dockerfile.sandbox (debian:bookworm-slim + Python/Node)
#   2. Build the image: podman build -f Dockerfile.sandbox -t localhost/goclaw-sandbox:bookworm-slim .
#   3. Enable this overlay in .env's COMPOSE_FILE
#
# Usage:
#   docker compose -f use_debian/goclaw/service.goclaw.yml -f use_debian/goclaw/service.sandbox.yml -f use_debian/goclaw/+self-improve.yml up -d

services:
  goclaw:
    environment:
      - GOCLAW_SANDBOX_MODE=all
      - GOCLAW_SANDBOX_IMAGE=localhost/goclaw-sandbox:bookworm-slim
      - GOCLAW_SANDBOX_WORKSPACE_ACCESS=rw
      - GOCLAW_SANDBOX_SCOPE=session
      - GOCLAW_SANDBOX_MEMORY_MB=512
      - GOCLAW_SANDBOX_CPUS=1.0
      - GOCLAW_SANDBOX_TIMEOUT_SEC=300
      - GOCLAW_SANDBOX_NETWORK=false
