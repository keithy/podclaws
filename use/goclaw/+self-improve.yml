# Self-improve overlay for goclaw
# Mounts scripts and skills into the container
#
# Launch:
#   docker compose -f use/goclaw/service.goclaw.yml -f use/goclaw/+self-improve.yml up -d

services:
  goclaw:
    volumes:
      - ${SELF_IMPROVE_DIR:-./use/self-improve}/sbin:/usr/local/sbin:ro
      - ${SELF_IMPROVE_DIR:-./use/self-improve}/skills/self-improve:/app/bundled-skills/self-improve:ro
    environment:
      - HOST_TASKS_DIR=/app/data/.runtime/sensible/tasks