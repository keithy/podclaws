# Self-improve overlay for goclaw
# Mounts scripts and skills into the container

goclaw:
  image: localhost/goclaw:current
  volumes:
    - ${SELF_IMPROVE_DIR:-../self-improve}/sbin:/usr/local/sbin:ro
    - ${SELF_IMPROVE_DIR:-../self-improve}/skills/self-improve:/app/workspace/skills/self-improve:ro
  environment:
    - HOST_TASKS_DIR=/app/data/.runtime/sensible/tasks
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
